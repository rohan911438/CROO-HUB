version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: croo-hub-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: croo_hub

  backend:
    build:
      context: ./backend
    container_name: croo-hub-backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/croo_hub
      JWT_ACCESS_SECRET: change_me_access_secret
      JWT_REFRESH_SECRET: change_me_refresh_secret
      CLIENT_URL: http://localhost:3000
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: croo-hub-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    env_file:
      - ./frontend/.env

volumes:
  mongo_data:
